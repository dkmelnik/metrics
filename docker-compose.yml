version: "3.4"

services:
  agent:
    container_name: agent
    build:
      context: .
      dockerfile: docker/Dockerfile-agent
      target: production
    environment:
      - LOG_LEVEL=error
      - ADDRESS=http://localhost:8080
      - REPORT_INTERVAL=10
      - POLL_INTERVAL=2
    ports:
      - "80:8080"


  server:
    container_name: server
    build:
      context: .
      dockerfile: docker/Dockerfile-server
      target: production
    environment:
      - LOG_LEVEL=error
      - ADDRESS=0.0.0.0:8080
      - FILE_STORAGE_PATH=/app/tmp/metrics-db.json
      - RESTORE=true
      - STORE_INTERVAL=10
      - APP_MODE=production
    ports:
      - "81:8080"




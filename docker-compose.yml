version: "3.4"

services:
  agent:
    container_name: agent
    build:
      context: .
      dockerfile: docker/Dockerfile-agent
      target: production
    environment:
      - TZ=Europe/Moscow
      - LOG_LEVEL=info
      - APP_MODE=production
      - ADDRESS=http://server:8080
      - GRPC_ADDRESS=http://server:5300
      - REPORT_INTERVAL=10
      - POLL_INTERVAL=2
      - KEY=some_key
      - CRYPTO_KEY=./cmd/certs/public_key.pem
    ports:
      - "80:8080"

  server:
    container_name: server
    build:
      context: .
      dockerfile: docker/Dockerfile-server
      target: production
    environment:
      - TZ=Europe/Moscow
      - LOG_LEVEL=info
      - ADDRESS=0.0.0.0:8080
      - GRPC_ADDRESS=0.0.0.0:5300
      - FILE_STORAGE_PATH=/app/tmp/metrics-db.json
      - RESTORE=true
      - STORE_INTERVAL=10
      - APP_MODE=production
      - DATABASE_DSN=host=server_db port=5432 user=web dbname=local sslmode=disable password=web
      - KEY=some_key
      - CRYPTO_KEY=./cmd/certs/private_key.pem
      - TRUSTED_SUBNET=172.19.0.0/16
    depends_on:
      - server_db
    ports:
      - "81:8080"

  server_db:
    image: postgres:16.1-alpine3.19
    container_name: server_db
    environment:
      TZ: "Europe/Moscow"
      POSTGRES_DB: "local"
      POSTGRES_USER: "web"
      POSTGRES_PASSWORD: "web"
    ports:
      - "5432:5432"


